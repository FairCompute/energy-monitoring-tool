# This workflow builds and uploads the EMT Python package to PyPI when a release is created.
# It uses maturin to build the native Rust extension (PyO3 bindings).

name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: python -m pip install maturin

      - name: Build wheel
        run: maturin build --release --strip

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.python-version }}
          path: target/wheels/*.whl

  build-sdist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: python -m pip install maturin

      - name: Build sdist
        run: maturin sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: target/wheels/*.tar.gz

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - build-wheel
      - build-sdist
    permissions:
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/emt/${{ github.event.release.name }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
